services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    ports:
      - "23900:9000"
      - "23901:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 5s
      retries: 5

  backend:
    image: bndradio_backend:latest
    environment:
      ASPNETCORE_URLS: "http://+:5000"
      ADMIN_LOGIN: "admin"
      ADMIN_PASSWORD: "mysecretpassword"
      JWT_SECRET: "supersecretkey1234567890abcdefgh111111111111111111111111111111111111111111111"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET_NAME: "audio"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    stop_grace_period: 5s

  frontend:
    image: bndradio_frontend:latest
    ports:
      - "23000:80"
    depends_on:
      - backend
    stop_grace_period: 5s

volumes:
  minio_data:
