services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: "__POSTGRES_USER__"
      POSTGRES_PASSWORD: "__POSTGRES_PASSWORD__"
      POSTGRES_DB: "__POSTGRES_DB__"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "__MINIO_ROOT_USER__"
      MINIO_ROOT_PASSWORD: "__MINIO_ROOT_PASSWORD__"
    ports:
      - "23900:9000"
      - "23901:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: bndradio_backend:latest
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=__POSTGRES_DB__;Username=__POSTGRES_USER__;Password=__POSTGRES_PASSWORD__"
      ConnectionStrings__Redis: "redis:6379"
      ASPNETCORE_URLS: "__ASPNETCORE_URLS__"
      CORS_ORIGINS: "__CORS_ORIGINS__"
      ADMIN_LOGIN: "__ADMIN_LOGIN__"
      ADMIN_PASSWORD: "__ADMIN_PASSWORD__"
      JWT_SECRET: "__JWT_SECRET__"
      MINIO_ENDPOINT: "__MINIO_ENDPOINT__"
      MINIO_ACCESS_KEY: "__MINIO_ACCESS_KEY__"
      MINIO_SECRET_KEY: "__MINIO_SECRET_KEY__"
      MINIO_BUCKET_NAME: "__MINIO_BUCKET_NAME__"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    stop_grace_period: 5s

  frontend:
    image: bndradio_frontend:latest
    ports:
      - "__FRONTEND_PORT__:80"
    depends_on:
      - backend
    stop_grace_period: 5s

volumes:
  postgres_data:
  minio_data: